openapi: "3.1.0"
info:
  title: Textbook RAG API
  description: >
    Single-endpoint API that accepts a student's natural-language question,
    retrieves the most relevant textbook passages from a vector store, and
    returns an AI-generated answer with source references.
  version: "1.0.0"

servers:
  - url: http://localhost:8000
    description: Local development server

paths:
  /api/chat:
    post:
      summary: Answer a student question using RAG
      operationId: chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
            examples:
              basic:
                summary: Simple module question
                value:
                  question: "What is the difference between Nav2 and MoveIt?"
              scoped:
                summary: Module-scoped question
                value:
                  question: "How does ROS 2 handle message passing?"
                  context: "module-1"
      responses:
        "200":
          description: Answer successfully generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatSuccess"
              example:
                answer: "Nav2 is responsible for autonomous navigation and path planning, while MoveIt handles arm/joint manipulation..."
                sources:
                  - file: "module-3/chapter-12-nav2-bipedal-planning"
                    heading: "Nav2 vs MoveIt — When to Use Each"
                    module_num: 3
        "400":
          description: Invalid request (empty question or question too long)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                empty:
                  value:
                    error: "Question must not be empty."
                too_long:
                  value:
                    error: "Question too long (max 2000 characters)."
        "503":
          description: Downstream service unavailable (Qdrant or Cohere)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                empty_db:
                  value:
                    error: "Knowledge base not populated. Please run ingest.py first."
                embedding_down:
                  value:
                    error: "Embedding service temporarily unavailable. Please try again later."
                generation_down:
                  value:
                    error: "Answer generation temporarily unavailable. Please try again later."

  /health:
    get:
      summary: Health check — confirms backend is reachable
      operationId: health
      responses:
        "200":
          description: Service is up
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"

components:
  schemas:
    ChatRequest:
      type: object
      required:
        - question
      properties:
        question:
          type: string
          minLength: 1
          maxLength: 2000
          description: Natural-language question from the student
          example: "What is ROS 2?"
        context:
          type: string
          nullable: true
          enum: ["module-1", "module-2", "module-3", "module-4"]
          description: >
            Optional module scope. When provided, retrieval is filtered to
            chunks from that module only. When absent, all modules are searched.
          example: "module-1"

    SourceReference:
      type: object
      required:
        - file
        - heading
        - module_num
      properties:
        file:
          type: string
          description: >
            Relative file path of the source chapter (without extension),
            matching Docusaurus sidebar IDs.
          example: "module-1/chapter-2-nodes-topics"
        heading:
          type: string
          description: The ## section heading where the answer was found
          example: "ROS 2 Topics and Publishers"
        module_num:
          type: integer
          description: Module number (1–4)
          example: 1

    ChatSuccess:
      type: object
      required:
        - answer
        - sources
      properties:
        answer:
          type: string
          description: AI-generated answer text grounded in retrieved textbook chunks
        sources:
          type: array
          items:
            $ref: "#/components/schemas/SourceReference"
          minItems: 1
          maxItems: 5
          description: The textbook chunks used as grounding context for the answer

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Human-readable error message suitable for display in the UI
